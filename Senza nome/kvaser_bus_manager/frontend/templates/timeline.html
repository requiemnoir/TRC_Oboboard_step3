<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline Viewer — TRC Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/chart.js"></script>
    <script src="/static/vendor/plotly-2.30.0.min.js"></script>
    <script>
        // Fallback to CDN if local asset is missing.
        if (!window.Plotly) {
            const s = document.createElement('script');
            s.src = 'https://cdn.plot.ly/plotly-2.30.0.min.js';
            document.head.appendChild(s);
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    {% include '_navbar.html' %}

    <div class="container-fluid mt-4">
        <div class="card mb-3">
            <div class="card-header bg-warning text-dark d-flex justify-content-between align-items-center">
                <span class="fw-bold">Timeline Viewer</span>
                <small id="timeline-status" class="text-muted">Ready</small>
            </div>
            <div id="timeline-container" class="card-body">
                <div class="row g-2 align-items-end mb-2">
                    <div class="col-md-3">
                        <label class="form-label small text-muted">Mode</label>
                        <div class="d-flex gap-2 align-items-center">
                            <select id="timeline-mode" class="form-select form-select-sm">
                                <option value="review" selected>Review (MP4 + MF4)</option>
                                <option value="live">Live (Realtime decode)</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small text-muted">Session</label>
                        <select id="timeline-session" class="form-select form-select-sm"></select>
                    </div>
                    <div class="col-md-3 d-grid">
                        <button id="timeline-load" class="btn btn-sm btn-outline-warning">Load</button>
                    </div>
                </div>

                <div class="ratio ratio-4x3 mb-2">
                    <video id="timeline-video" class="rounded border border-secondary" controls playsinline
                        style="width:100%; height:100%; display:none;"></video>
                    <img id="timeline-live" class="webcam-stream rounded border border-secondary" alt="Live Webcam"
                        style="display:none;" />
                </div>

                <div class="row g-2 mb-2">
                    <div class="col-md-3">
                        <label class="form-label small text-muted">CAN channel</label>
                        <select id="timeline-channel" class="form-select form-select-sm"></select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small text-muted">DBC(s)</label>
                        <select id="timeline-dbc" class="form-select form-select-sm" multiple size="4"
                            style="min-height: 110px;">
                            <option value="" selected>Auto (use config mapping per channel)</option>
                        </select>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label small text-muted">Signals</label>
                        <select id="timeline-signals" class="form-select form-select-sm" multiple size="8"></select>
                        <div id="timeline-signal-count" class="small text-muted mt-1">0 / 10</div>
                    </div>
                </div>

                <div class="row g-2 mb-2">
                    <div class="col-md-9 d-flex gap-2 align-items-end">
                        <button id="timeline-refresh-signals" class="btn btn-sm btn-outline-secondary">Refresh signals</button>
                        <div class="small text-muted">Select up to 10 signals to plot.</div>
                    </div>
                    <div class="col-md-3 d-grid">
                        <button id="timeline-plot" class="btn btn-sm btn-outline-light" disabled>Plot</button>
                    </div>
                </div>

                <div id="timeline-values" class="small text-muted mb-2"></div>
                <div id="timeline-plot-area" style="width: 100%; height: 420px;"></div>
            </div>
        </div>
    </div>

    <script>
        // Let app.js know we're on the standalone timeline page.
        window.KVBM_PAGE = 'timeline';
    </script>
    <script src="/static/js/app.js"></script>
</body>

</html>
