<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sentinel</title>
    <!-- Use the existing CSS for base styles -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/sentinel.css') }}" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap"
        rel="stylesheet">
</head>

<body class="sentinel-body">
    <!-- Navbar (Optional, can be hidden for full immersive experience) -->
    <nav class="navbar navbar-dark bg-transparent">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1 glass-effect">TRC :: THE SENTINEL</span>
            <a href="/" class="btn btn-outline-light btn-sm glass-effect">EXIT</a>
        </div>
    </nav>

    <div class="sentinel-container">
        <!-- Background Layer -->
        <div class="sentinel-bg"></div>

        <!-- Snow/Storm Overlay -->
        <div class="snow-layer"></div>
        <div class="fog-layer"></div>

        <!-- Helicopter Spotlight Effect -->
        <div class="spotlight"></div>

        <!-- Main Content -->
        <div class="content-overlay">
            <h1 class="glitch-text" data-text="THE SENTINEL">THE SENTINEL</h1>
            <div class="status-panel glass-panel">
                <div class="status-row">
                    <span class="label">TARGET:</span>
                    <span class="value blink">LMB-7704 [DETECTED]</span>
                </div>
                <div class="status-row">
                    <span class="label">STATUS:</span>
                    <span class="value">PURSUIT MODE</span>
                </div>
                <div class="status-row">
                    <span class="label">WEATHER:</span>
                    <span class="value">BLIZZARD / VISIBILITY LOW</span>
                </div>
                <div class="radar-scan"></div>
            </div>

            <div class="action-buttons">
                <button class="sentinel-btn">INITIATE SCAN</button>
                <button class="sentinel-btn warning">ENGAGE PROTOCOL</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/sentinel.js') }}"></script>
</body>

</html>
