<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EV-Q Onboard Manager — Violations</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
{% include '_navbar.html' %}

<div class="container-fluid mt-4" style="max-width: 1400px;">
  <div class="row g-3">

    <div class="col-12">
      <div class="card border-secondary">
        <div class="card-header bg-dark text-warning border-secondary d-flex justify-content-between align-items-center">
          <span>Status</span>
          <div class="d-flex gap-2 align-items-center flex-wrap">
            <span id="ws" class="badge text-bg-secondary">WS: —</span>
            <button id="btn-demo" class="btn btn-sm btn-outline-warning" title="Generates a demo violation (localhost only)">Demo Violation</button>
            <button id="btn-clear" class="btn btn-sm btn-outline-danger" title="Deletes all stored violations">Clear</button>
            <button id="btn-refresh" class="btn btn-sm btn-outline-secondary">Refresh</button>
          </div>
        </div>
        <div class="card-body">
          <div class="row g-2">
            <div class="col-md-4">
              <div class="d-flex gap-2 align-items-center">
                <span class="text-muted">Last 24h:</span>
                <span id="st-total" class="badge text-bg-secondary">total —</span>
                <span id="st-info" class="badge text-bg-secondary">info —</span>
                <span id="st-warn" class="badge text-bg-secondary">warning —</span>
                <span id="st-crit" class="badge text-bg-secondary">critical —</span>
              </div>
            </div>
            <div class="col-md-8">
              <div class="row g-2">
                <div class="col-md-3">
                  <label class="form-label small text-muted">Severity</label>
                  <select id="f-sev" class="form-select form-select-sm">
                    <option value="">(any)</option>
                    <option value="info">info</option>
                    <option value="warning">warning</option>
                    <option value="critical">critical</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label small text-muted">Rule</label>
                  <select id="f-rule" class="form-select form-select-sm"></select>
                </div>
                <div class="col-md-3">
                  <label class="form-label small text-muted">Limit</label>
                  <select id="f-limit" class="form-select form-select-sm">
                    <option value="100">100</option>
                    <option value="200" selected>200</option>
                    <option value="500">500</option>
                    <option value="1000">1000</option>
                  </select>
                </div>
                <div class="col-md-2 d-grid">
                  <label class="form-label small text-muted">&nbsp;</label>
                  <button id="btn-apply" class="btn btn-sm btn-outline-warning">Apply</button>
                </div>
              </div>
            </div>
          </div>
          <div id="msg" class="small text-muted mt-2"></div>
        </div>
      </div>
    </div>

    <div class="col-12">
      <div class="card border-secondary">
        <div class="card-header bg-dark text-warning border-secondary d-flex justify-content-between align-items-center">
          <span>Live feed</span>
          <small class="text-muted">Socket event: <span class="text-warning">violation</span></small>
        </div>
        <div class="card-body" style="max-height: 240px; overflow:auto;">
          <div id="live" class="small"></div>
        </div>
      </div>
    </div>

    <div class="col-12">
      <div class="card border-secondary">
        <div class="card-header bg-dark text-warning border-secondary">History</div>
        <div class="card-body">
          <div class="table-responsive" style="max-height: 520px; overflow:auto;">
            <table class="table table-dark table-striped table-sm align-middle">
              <thead>
                <tr>
                  <th>ts</th>
                  <th>severity</th>
                  <th>rule</th>
                  <th>description</th>
                  <th>diff</th>
                  <th>threshold</th>
                </tr>
              </thead>
              <tbody id="tb"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
(() => {
  const el = (id) => document.getElementById(id);
  const msg = (t) => { el('msg').textContent = t || ''; };

  let rules = [];

  async function api(url, opts) {
    const r = await fetch(url, opts || {});
    const j = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(j.error || j.message || ('HTTP ' + r.status));
    return j;
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>\"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[c]));
  }

  function fmtTs(ms) {
    try {
      const d = new Date(Number(ms));
      return d.toLocaleString();
    } catch { return String(ms); }
  }

  function sevBadge(sev) {
    const s = String(sev||'').toLowerCase();
    if (s === 'critical') return '<span class="badge text-bg-danger">critical</span>';
    if (s === 'warning') return '<span class="badge text-bg-warning text-dark">warning</span>';
    return '<span class="badge text-bg-secondary">' + escapeHtml(s||'info') + '</span>';
  }

  function appendLive(v) {
    const line = document.createElement('div');
    line.className = 'border-bottom border-secondary py-1';
    line.innerHTML = `${sevBadge(v.severity)} <span class="text-muted">${escapeHtml(fmtTs(v.ts_ms))}</span> <span class="text-warning">${escapeHtml(v.rule_name||v.rule_id||'')}</span> — ${escapeHtml(v.description||'')}`;
    const box = el('live');
    box.prepend(line);
    while (box.childElementCount > 60) box.removeChild(box.lastElementChild);
  }

  async function loadRules() {
    const j = await api('/api/comparison/rules');
    rules = j.rules || [];
    const sel = el('f-rule');
    sel.innerHTML = '<option value="">(any)</option>';

    const seen = new Set();
    for (const r of rules) {
      const o = document.createElement('option');
      o.value = r.id;
      o.textContent = `${r.name || r.id}`;
      sel.appendChild(o);
      seen.add(String(r.id || ''));
    }

    // Also include AI anomaly -> violation rule (configured in /ai)
    try {
      const aij = await api('/api/ai/config');
      const c = aij.config || {};
      const rid = String(c.violation_rule_id || '').trim();
      const rname = String(c.violation_rule_name || '').trim();
      if (rid && !seen.has(rid)) {
        const o = document.createElement('option');
        o.value = rid;
        o.textContent = `AI: ${rname || rid}`;
        sel.appendChild(o);
        seen.add(rid);
      }
    } catch {
      // ignore if AI feature not available
    }
  }

  async function loadStats() {
    const j = await api('/api/violations/statistics');
    const by = j.by_severity || {};
    el('st-total').textContent = 'total ' + (j.total ?? 0);
    el('st-info').textContent = 'info ' + (by.info ?? 0);
    el('st-warn').textContent = 'warning ' + (by.warning ?? 0);
    el('st-crit').textContent = 'critical ' + (by.critical ?? 0);
  }

  async function loadHistory() {
    const sev = el('f-sev').value;
    const rid = el('f-rule').value;
    const limit = el('f-limit').value;
    const params = new URLSearchParams();
    if (sev) params.set('severity', sev);
    if (rid) params.set('rule_id', rid);
    params.set('limit', String(limit || 200));
    params.set('desc', 'true');

    msg('Loading…');
    const j = await api('/api/violations?' + params.toString());
    const tb = el('tb');
    tb.innerHTML = '';
    for (const v of (j.items || [])) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="text-muted">${escapeHtml(fmtTs(v.ts_ms))}</td>
        <td>${sevBadge(v.severity)}</td>
        <td><div class="fw-semibold">${escapeHtml(v.rule_name||'')}</div><div class="text-muted small">${escapeHtml(v.rule_id||'')}</div></td>
        <td>${escapeHtml(v.description||'')}</td>
        <td>${escapeHtml(v.diff ?? '')}</td>
        <td>${escapeHtml(v.threshold ?? '')}</td>
      `;
      tb.appendChild(tr);
    }
    msg(`Loaded ${j.items?.length||0} of ${j.total||0}.`);
  }

  async function refreshAll() {
    await loadRules();
    await loadStats();
    await loadHistory();
  }

  async function demoViolation() {
    msg('Generating demo violation…');
    try {
      const j = await api('/api/monitor/demo_violation', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({}) });
      if (j && j.ok) {
        appendLive({
          severity: 'warning',
          ts_ms: Date.now(),
          rule_name: 'DEMO',
          description: `Injected ${j.message}.${j.signal} from ${j.dbc_name}`,
        });
        await loadStats();
        await loadHistory();
        msg('Demo violation generated.');
      } else {
        msg('Demo failed.');
      }
    } catch (e) {
      msg('Demo failed: ' + String(e.message || e));
    }
  }

  async function clearViolations() {
    const ok = confirm('Delete ALL stored violations? This cannot be undone.');
    if (!ok) return;
    const delCsv = confirm('Also delete violations CSV files (violations_YYYYMMDD.csv) from logs/monitor?');
    msg('Clearing…');
    const j = await api('/api/violations/clear', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ delete_csv: !!delCsv }) });
    await loadStats();
    await loadHistory();
    msg(`Cleared. Deleted ${j.deleted ?? 0} rows${(j.csv_deleted ? (', CSV files: ' + j.csv_deleted) : '')}.`);
  }

  // Websocket
  try {
    const socket = io();
    socket.on('connect', () => { el('ws').textContent = 'WS: connected'; el('ws').className = 'badge text-bg-success'; });
    socket.on('disconnect', () => { el('ws').textContent = 'WS: disconnected'; el('ws').className = 'badge text-bg-secondary'; });
    socket.on('violation', (v) => {
      appendLive(v || {});
      // keep stats a bit fresh
      loadStats().catch(() => {});
    });
  } catch {
    el('ws').textContent = 'WS: error';
    el('ws').className = 'badge text-bg-danger';
  }

  el('btn-refresh').addEventListener('click', () => refreshAll().catch(e => msg(String(e.message||e))));
  el('btn-apply').addEventListener('click', () => loadHistory().catch(e => msg(String(e.message||e))));
  el('btn-demo').addEventListener('click', () => demoViolation().catch(e => msg(String(e.message||e))));
  el('btn-clear').addEventListener('click', () => clearViolations().catch(e => msg(String(e.message||e))));

  refreshAll().catch(e => msg(String(e.message||e)));
})();
</script>

<script src="/static/js/navbar.js?v=20260207a"></script>

</body>
</html>
